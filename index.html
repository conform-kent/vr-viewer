<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Model Browser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#0a0a0b;--surface:#111113;--surface2:#18181c;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.18);--text:#e8e8e6;--muted:#6b6b72;--accent:#c8f542;--accent2:#42f5c8;--danger:#f54242;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;}
#setup-screen{min-height:100vh;display:none;}
#browser-screen{display:none;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,11,0.92);backdrop-filter:blur(12px);z-index:10;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.wordmark{font-family:'DM Mono',monospace;font-size:14px;font-weight:400;letter-spacing:-0.3px;}
.wordmark span{color:var(--accent);}
.folder-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-icon{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;}
.btn-icon:hover{border-color:var(--border-hover);color:var(--text);}
.content{padding:28px 24px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.section-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);background:rgba(200,245,66,0.1);border-radius:6px;padding:2px 8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.model-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;position:relative;}
.model-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
.model-card:active{transform:translateY(-1px);}
.thumb-wrap{width:100%;aspect-ratio:1;background:var(--surface2);position:relative;overflow:hidden;}
.thumb-wrap canvas{width:100%!important;height:100%!important;display:block;}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;}
.thumb-placeholder .icon{font-size:28px;opacity:0.4;}
.card-body{padding:12px 14px 14px;}
.model-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.model-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.launch-btn{position:absolute;bottom:10px;right:10px;background:var(--accent);color:#0a0a0b;border:none;border-radius:8px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;opacity:0;transition:opacity 0.18s;pointer-events:none;}
.model-card:hover .launch-btn{opacity:1;pointer-events:auto;}
/* Viewer */
#viewer-overlay{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column;}
#viewer-overlay.active{display:flex;}
#viewer-canvas-wrap{flex:1;position:relative;overflow:hidden;}
#viewer-canvas-wrap canvas{width:100%!important;height:100%!important;}
.loading-overlay{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:5;transition:opacity 0.4s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.status-msg{text-align:center;padding:60px 24px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;}
.status-msg .big{font-size:32px;display:block;margin-bottom:12px;}
.status-msg.error{color:var(--danger);}
.viewer-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(0,0,0,0.88);border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;gap:12px;}
.viewer-title{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1;}
.viewer-controls{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.vr-btn{background:var(--accent);color:#0a0a0b;border:none;border-radius:8px;padding:8px 16px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:opacity 0.18s;}
.vr-btn:hover{opacity:0.85;}
.vr-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
/* Toggle */
.tog{position:relative;display:inline-block;width:30px;height:16px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog-s{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.12);border-radius:16px;transition:background 0.2s;}
.tog-s:before{content:'';position:absolute;height:12px;width:12px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.tog input:checked+.tog-s{background:var(--accent);}
.tog.teal input:checked+.tog-s{background:var(--accent2);}
.tog input:checked+.tog-s:before{transform:translateX(14px);}
/* Desktop mode buttons */
.dm-btn{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.dm-btn.active{color:#0a0a0b;border-color:transparent;}
.dm-btn.m-pin.active{background:#f54242;}
.dm-btn.m-meas.active{background:#f5a142;}
/* Canvas cursor changes */
.canvas-orbit{cursor:grab;}
.canvas-pin{cursor:crosshair;}
.canvas-meas{cursor:cell;}
</style>
</head>
<body>

<!-- BROWSER -->
<div id="browser-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="wordmark">VR<span>.</span>browser</span>
      <span class="folder-badge" id="folder-badge">—</span>
    </div>
    <button class="btn-icon" onclick="loadModels()">↺ Refresh</button>
  </div>
  <div class="content">
    <div class="section-header">
      <span class="section-title">Models in folder</span>
      <span class="count-badge" id="count-badge">0 files</span>
    </div>
    <div class="grid" id="model-grid"></div>
  </div>
</div>

<!-- VIEWER -->
<div id="viewer-overlay">
  <div id="viewer-canvas-wrap">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-label" id="loading-label">Loading model…</span>
    </div>
  </div>

  <!-- Tool strip -->
  <div id="tool-strip" style="display:none;flex-direction:column;background:rgba(8,8,10,0.97);border-top:1px solid rgba(255,255,255,0.06);">

    <!-- Row A: sizes, slicers, explode, light -->
    <div style="display:flex;align-items:center;gap:12px;padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;">

      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;text-transform:uppercase;letter-spacing:.08em;">Size</span>
        <span id="size-readout" style="font-family:'DM Mono',monospace;font-size:11px;color:#e8e8e6;">—</span>
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- Explode -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;text-transform:uppercase;letter-spacing:.08em;">Explode</span>
        <input type="range" min="0" max="1" step="0.01" value="0" oninput="onExplodeSlider(this.value)" style="width:76px;accent-color:#c8f542;">
        <span id="explode-val" style="font-family:'DM Mono',monospace;font-size:10px;color:#c8f542;min-width:22px;">0%</span>
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- H-Cut -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#42f5c8;text-transform:uppercase;letter-spacing:.08em;">H-Cut ↕</span>
        <label class="tog teal">
          <input type="checkbox" id="hslice-tog" onchange="onHSliceToggle(this.checked)">
          <span class="tog-s"></span>
        </label>
        <input type="range" id="hslice-sl" min="0" max="1" step="0.005" value="0.5"
          oninput="onHSliceSlider(this.value)" style="width:76px;accent-color:#42f5c8;">
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- V-Cut -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#c8f542;text-transform:uppercase;letter-spacing:.08em;">V-Cut ↔</span>
        <label class="tog">
          <input type="checkbox" id="vslice-tog" onchange="onVSliceToggle(this.checked)">
          <span class="tog-s"></span>
        </label>
        <input type="range" id="vslice-sl" min="0" max="1" step="0.005" value="0.5"
          oninput="onVSliceSlider(this.value)" style="width:76px;accent-color:#c8f542;">
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- Light -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#f5a142;text-transform:uppercase;letter-spacing:.08em;">☀ Light</span>
        <input type="range" id="light-sl" min="0" max="360" step="1" value="45"
          oninput="onLightSlider(this.value)" style="width:76px;accent-color:#f5a142;">
        <span id="light-val" style="font-family:'DM Mono',monospace;font-size:10px;color:#f5a142;min-width:26px;">45°</span>
      </div>
    </div>

    <!-- Row B: desktop mode, measure, pins, export, actions -->
    <div style="display:flex;align-items:center;gap:10px;padding:5px 16px;flex-wrap:wrap;">

      <!-- Mode buttons -->
      <div style="display:flex;align-items:center;gap:4px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;text-transform:uppercase;letter-spacing:.08em;margin-right:2px;">Mode</span>
        <button id="dm-orbit" class="dm-btn active"  onclick="setDesktopMode('orbit')">Orbit</button>
        <button id="dm-meas"  class="dm-btn m-meas"  onclick="setDesktopMode('measure')">↔ Measure</button>
        <button id="dm-pin"   class="dm-btn m-pin"   onclick="setDesktopMode('pin')">◎ Pin</button>
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- Measure readout -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span id="measure-readout" style="font-family:'DM Mono',monospace;font-size:11px;color:#f5a142;">—</span>
        <button onclick="clearMeasure()" style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:1px 5px;cursor:pointer;">clr</button>
      </div>
      <div style="width:1px;height:14px;background:rgba(255,255,255,0.07)"></div>

      <!-- Pins -->
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;text-transform:uppercase;letter-spacing:.08em;">◎ Pins</span>
        <span id="annot-count" style="font-family:'DM Mono',monospace;font-size:11px;color:#f54242;">0</span>
        <button onclick="onClearAnnotations()" style="font-family:'DM Mono',monospace;font-size:9px;color:#6b6b72;background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:1px 5px;cursor:pointer;">clear</button>
      </div>

      <!-- Right actions -->
      <div style="display:flex;gap:6px;margin-left:auto;align-items:center;">
        <button onclick="exportPinReport()" style="font-family:'DM Mono',monospace;font-size:10px;color:#4290f5;background:rgba(66,144,245,0.08);border:1px solid rgba(66,144,245,0.25);border-radius:6px;padding:4px 10px;cursor:pointer;">⬡ Export PDF</button>
        <button onclick="onResetTransform()" style="font-family:'DM Mono',monospace;font-size:11px;color:#e8e8e6;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:4px 11px;cursor:pointer;">↺ Reset</button>
        <button onclick="onSnapshot()" style="font-family:'DM Mono',monospace;font-size:11px;color:#0a0a0b;background:#c8f542;border:none;border-radius:7px;padding:4px 11px;cursor:pointer;font-weight:500;">⬡ Snapshot</button>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="viewer-bar">
    <span class="viewer-title" id="viewer-title">—</span>
    <div class="viewer-controls">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:#c8f542;background:rgba(200,245,66,0.08);border:1px solid rgba(200,245,66,0.2);border-radius:6px;padding:3px 8px;">L grip → move</span>
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:#4290f5;background:rgba(66,144,245,0.08);border:1px solid rgba(66,144,245,0.2);border-radius:6px;padding:3px 8px;">Laser: R trigger · A → pin</span>
      <button class="vr-btn secondary" onclick="closeViewer()">← Back</button>
      <button class="vr-btn" id="vr-btn" onclick="enterVR()">Enter VR</button>
    </div>
  </div>
</div>

<!-- VR HUD -->
<div id="vr-hud" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 16px;pointer-events:none;z-index:200;">
  <div id="hud-pills" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;"></div>
  <div id="hud-measure" style="display:none;text-align:center;font-family:'DM Mono',monospace;font-size:18px;color:#c8f542;margin-top:8px;text-shadow:0 0 12px rgba(200,245,66,0.5);"></div>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';

// ── Config ───────────────────────────────────────────────────
const THUMB_KEY = 'vr_thumb_cache';
const config = {
  folderId: '1OtwMUU-oHisoufPNRCl4IUDT7qVR7dcG',
  apiKey:   'AIzaSyAu0q693wWtUyIPhkra3sLFn04XQjpKk9k'
};
let thumbCache = {};
let currentModels = [];

// ── Viewer core ──────────────────────────────────────────────
let viewerScene, viewerRenderer, viewerCamera, viewerControls;
let sunLight = null;
let lightAngleDeg = 45;

// ── Model ────────────────────────────────────────────────────
let modelRoot = null, loadedModel = null;
let modelSize = new THREE.Vector3();

// ── VR slicer ────────────────────────────────────────────────
let slicerPlane = null, slicerMesh = null;
let slicerGroup = null, slicerActive = false;

// ── Desktop slicers ──────────────────────────────────────────
let hSlicePlane = null, vSlicePlane = null;
let hSliceActive = false, vSliceActive = false;
let hSliceEdge = null, vSliceEdge = null;

// ── Grab ─────────────────────────────────────────────────────
const grabState = { left: null, right: null };

// ── Measure ──────────────────────────────────────────────────
let measureState = { ptA:null, ptB:null, lineObj:null, sphereA:null, sphereB:null };
let measurePhase = 0;

// ── Desktop mode ─────────────────────────────────────────────
let desktopMode = 'orbit';

// ── Pins ─────────────────────────────────────────────────────
const PIN_COLORS = [
  0xf54242, 0xf5a142, 0xe8e042, 0x42f542,
  0x42f5c8, 0x4290f5, 0xa042f5, 0xf542b8,
  0xff6600, 0x00bcd4
];
let annotations = [], annotCount = 0;

// ── Explode ──────────────────────────────────────────────────
let explodeAmount = 0;
const explodeOrigins = new Map();

// ── VR modes ─────────────────────────────────────────────────
const VR_MODES = ['grab','slice','measure','laser'];
let vrMode = 'grab';
let _lastThumbL = false, _lastThumbR = false;
let _prevFaceA = false;  // A button → drop pin at laser hit

// ── Laser ────────────────────────────────────────────────────
let laserLine = null, laserDot = null;

// ── Raycaster ────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouseNDC  = new THREE.Vector2();

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
(function boot() {
  try { const tc=localStorage.getItem(THUMB_KEY); if(tc) thumbCache=JSON.parse(tc); } catch(e){}
  showBrowser();
})();

// ════════════════════════════════════════════════════════════
//  BROWSER
// ════════════════════════════════════════════════════════════
function showBrowser() {
  document.getElementById('browser-screen').style.display='block';
  document.getElementById('folder-badge').textContent=config.folderId.slice(0,20)+'…';
  loadModels();
}

async function loadModels() {
  const grid=document.getElementById('model-grid');
  grid.innerHTML='<div class="status-msg"><div class="spinner" style="margin:0 auto"></div></div>';
  const url=`https://www.googleapis.com/drive/v3/files?q='${config.folderId}'+in+parents+and+mimeType='model/gltf-binary'+and+trashed=false&fields=files(id,name,size,modifiedTime)&key=${config.apiKey}`;
  try {
    let res=await fetch(url), data=await res.json();
    if(!data.files?.length){
      const u2=`https://www.googleapis.com/drive/v3/files?q='${config.folderId}'+in+parents+and+trashed=false&fields=files(id,name,size,modifiedTime,mimeType)&key=${config.apiKey}`;
      data=await (await fetch(u2)).json();
      if(data.files) data.files=data.files.filter(f=>f.name.toLowerCase().endsWith('.glb'));
    }
    if(data.error) throw new Error(data.error.message);
    currentModels=data.files||[];
    document.getElementById('count-badge').textContent=currentModels.length+' file'+(currentModels.length!==1?'s':'');
    renderGrid(currentModels);
  } catch(e) {
    grid.innerHTML=`<div class="status-msg error"><span class="big">⚠</span>${e.message}<br><small>Check API key and folder sharing.</small></div>`;
  }
}

function renderGrid(models) {
  const grid=document.getElementById('model-grid');
  if(!models.length){grid.innerHTML='<div class="status-msg"><span class="big">📂</span>No .glb files found.</div>';return;}
  grid.innerHTML='';
  models.forEach(model=>{
    const card=document.createElement('div'); card.className='model-card';
    const sizeMB=model.size?(model.size/1024/1024).toFixed(1)+' MB':'—';
    const name=model.name.replace(/\.glb$/i,'');
    card.innerHTML=`
      <div class="thumb-wrap" id="tw-${model.id}"><div class="thumb-placeholder"><span class="icon">⬡</span><span>Rendering…</span></div></div>
      <div class="card-body"><div class="model-name" title="${name}">${name}</div><div class="model-meta">${sizeMB}</div></div>
      <button class="launch-btn" onclick="event.stopPropagation();openViewer('${model.id}','${name.replace(/'/g,"\\'")}')">▶ View in VR</button>`;
    card.addEventListener('click',()=>openViewer(model.id,name));
    grid.appendChild(card);
    requestAnimationFrame(()=>renderThumb(model.id,name));
  });
}

// ════════════════════════════════════════════════════════════
//  THUMBNAILS
// ════════════════════════════════════════════════════════════
async function renderThumb(fileId,name) {
  const wrap=document.getElementById('tw-'+fileId); if(!wrap) return;
  if(thumbCache[fileId]){
    const img=document.createElement('img');
    img.src=thumbCache[fileId]; img.style.cssText='width:100%;height:100%;object-fit:contain;';
    wrap.innerHTML=''; wrap.appendChild(img); return;
  }
  const cv=document.createElement('canvas'); cv.width=cv.height=300;
  wrap.innerHTML=''; wrap.appendChild(cv);
  const r=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  r.setSize(300,300); r.setPixelRatio(1); r.outputEncoding=THREE.sRGBEncoding;
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(45,1,0.01,1000);
  sc.add(new THREE.AmbientLight(0xffffff,0.7));
  const d=new THREE.DirectionalLight(0xffffff,1.2); d.position.set(2,4,3); sc.add(d);
  const glbUrl=`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${config.apiKey}`;
  try {
    const gltf=await new Promise((res,rej)=>new THREE.GLTFLoader().load(glbUrl,res,null,rej));
    sc.add(gltf.scene);
    const box=new THREE.Box3().setFromObject(gltf.scene);
    const s=2/Math.max(...box.getSize(new THREE.Vector3()).toArray());
    gltf.scene.scale.setScalar(s);
    gltf.scene.position.sub(box.getCenter(new THREE.Vector3()).multiplyScalar(s));
    cam.position.set(1.8,1.2,1.8); cam.lookAt(0,0,0);
    r.render(sc,cam);
    thumbCache[fileId]=cv.toDataURL('image/jpeg',0.8);
    try{localStorage.setItem(THUMB_KEY,JSON.stringify(thumbCache));}catch(e){}
    r.dispose();
  } catch(e) {
    wrap.innerHTML=`<div class="thumb-placeholder"><span class="icon" style="opacity:0.3">⬡</span><span style="font-size:10px">${name.slice(0,12)}</span></div>`;
    r.dispose();
  }
}

function openViewer(fileId,name) {
  document.getElementById('viewer-overlay').classList.add('active');
  document.getElementById('viewer-title').textContent=name;
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-label').textContent='Loading model…';
  if(viewerRenderer) cleanupViewer();
  initViewer(fileId);
}
function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('active');
  cleanupViewer();
}
function cleanupViewer() {
  if(viewerRenderer){
    if(viewerRenderer.xr?.isPresenting) viewerRenderer.xr.getSession()?.end();
    viewerRenderer.setAnimationLoop(null);
    viewerRenderer.dispose(); viewerRenderer=null;
  }
  document.getElementById('viewer-canvas-wrap').querySelector('canvas')?.remove();
  annotations.forEach(a=>{viewerScene?.remove(a.mesh);viewerScene?.remove(a.stem);a.labelDiv?.remove();});
  annotations=[]; annotCount=0;
  viewerScene=viewerCamera=viewerControls=loadedModel=modelRoot=sunLight=null;
  slicerPlane=slicerMesh=slicerGroup=null; slicerActive=false;
  hSlicePlane=vSlicePlane=hSliceEdge=vSliceEdge=null; hSliceActive=vSliceActive=false;
  laserLine=laserDot=null;
  grabState.left=grabState.right=null;
  measureState={ptA:null,ptB:null,lineObj:null,sphereA:null,sphereB:null}; measurePhase=0;
  explodeAmount=0; explodeOrigins.clear();
  vrMode='grab'; desktopMode='orbit';
  _lastThumbL=_lastThumbR=_prevFaceA=false;
  document.getElementById('vr-hud').style.display='none';
  const ts=document.getElementById('tool-strip'); if(ts) ts.style.display='none';
  ['hslice-tog','vslice-tog'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
  setDesktopMode('orbit',true);
}

// ════════════════════════════════════════════════════════════
//  SLICER — VR (no fill cap, edge outline only)
// ════════════════════════════════════════════════════════════
function buildSlicer(scene) {
  slicerPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
  slicerGroup=new THREE.Group(); scene.add(slicerGroup);
  const sz=0.6, geo=new THREE.PlaneGeometry(sz,sz);
  // Invisible fill + bright teal edge lines
  slicerMesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false}));
  slicerMesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x42f5c8,linewidth:3})));
  slicerMesh.add(new THREE.Mesh(new THREE.CircleGeometry(0.007,16),new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide})));
  slicerGroup.add(slicerMesh); slicerMesh.visible=false;
}

function setClipping(active) { slicerActive=active; applyAllClipping(); }

function updateSlicer(ctrl) {
  if(!slicerActive||!ctrl||!slicerPlane) return;
  slicerGroup.position.setFromMatrixPosition(ctrl.matrixWorld);
  slicerGroup.quaternion.setFromRotationMatrix(ctrl.matrixWorld);
  const n=new THREE.Vector3(0,0,-1).applyQuaternion(slicerGroup.quaternion).normalize();
  slicerPlane.normal.copy(n); slicerPlane.constant=-n.dot(slicerGroup.position);
}

// ════════════════════════════════════════════════════════════
//  DESKTOP SLICE PLANES — edge outline only, no fill
// ════════════════════════════════════════════════════════════
function makeEdgeRect(color) {
  const sz=6;
  const geo=new THREE.PlaneGeometry(sz,sz);
  const group=new THREE.Group();
  group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color,linewidth:2})));
  // Faint cross to indicate plane centre
  const cg=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-sz/2,0,0),new THREE.Vector3(sz/2,0,0),
    new THREE.Vector3(0,-sz/2,0),new THREE.Vector3(0,sz/2,0)]);
  group.add(new THREE.LineSegments(cg,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.25})));
  group.visible=false;
  return group;
}

function buildDesktopSlicePlanes(scene) {
  hSlicePlane=new THREE.Plane(new THREE.Vector3(0,-1,0),0);
  vSlicePlane=new THREE.Plane(new THREE.Vector3(1,0,0),0);
  hSliceEdge=makeEdgeRect(0x42f5c8); scene.add(hSliceEdge);
  vSliceEdge=makeEdgeRect(0xc8f542); scene.add(vSliceEdge);
}

function getModelBounds() {
  if(!loadedModel) return {minY:0,maxY:2,minX:-1,maxX:1};
  const box=new THREE.Box3().setFromObject(modelRoot);
  return {minY:box.min.y,maxY:box.max.y,minX:box.min.x,maxX:box.max.x};
}

function onHSliceToggle(on) {
  if(on) {
    hSliceActive=true;
    const sl=document.getElementById('hslice-sl'); if(sl) sl.value=0.5;
    onHSliceSlider(0.5);
  } else {
    hSliceActive=false; applyAllClipping();
    if(hSliceEdge) hSliceEdge.visible=false;
  }
}
function onVSliceToggle(on) {
  if(on) {
    vSliceActive=true;
    const sl=document.getElementById('vslice-sl'); if(sl) sl.value=0.5;
    onVSliceSlider(0.5);
  } else {
    vSliceActive=false; applyAllClipping();
    if(vSliceEdge) vSliceEdge.visible=false;
  }
}

function onHSliceSlider(val) {
  if(!hSlicePlane||!loadedModel||!hSliceActive) return;
  const t=parseFloat(val);
  const {minY,maxY}=getModelBounds();
  const planeY=minY+t*(maxY-minY+0.05);
  hSlicePlane.normal.set(0,-1,0); hSlicePlane.constant=planeY;
  applyAllClipping();
  if(hSliceEdge){
    hSliceEdge.visible=true;
    hSliceEdge.position.set(0,planeY,0);
    hSliceEdge.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),new THREE.Vector3(0,1,0));
  }
}
function onVSliceSlider(val) {
  if(!vSlicePlane||!loadedModel||!vSliceActive) return;
  const t=parseFloat(val);
  const {minX,maxX}=getModelBounds();
  const planeX=minX+t*(maxX-minX);
  vSlicePlane.normal.set(1,0,0); vSlicePlane.constant=-planeX;
  applyAllClipping();
  if(vSliceEdge){
    vSliceEdge.visible=true;
    vSliceEdge.position.set(planeX,0,0);
    vSliceEdge.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),new THREE.Vector3(1,0,0));
  }
}

function applyAllClipping() {
  if(!loadedModel) return;
  const planes=[];
  if(hSliceActive&&hSlicePlane) planes.push(hSlicePlane);
  if(vSliceActive&&vSlicePlane) planes.push(vSlicePlane);
  if(slicerActive&&slicerPlane) planes.push(slicerPlane);
  loadedModel.traverse(c=>{if(!c.isMesh)return;c.material.clippingPlanes=planes;c.material.needsUpdate=true;});
}

// ════════════════════════════════════════════════════════════
//  LIGHT ROTATION
// ════════════════════════════════════════════════════════════
function onLightSlider(val) {
  lightAngleDeg=parseFloat(val);
  const lv=document.getElementById('light-val'); if(lv) lv.textContent=Math.round(lightAngleDeg)+'°';
  if(!sunLight) return;
  const rad=lightAngleDeg*Math.PI/180;
  sunLight.position.set(Math.sin(rad)*8, 6, Math.cos(rad)*8);
}

// ════════════════════════════════════════════════════════════
//  PINS
// ════════════════════════════════════════════════════════════
function getPinHex(idx) { return '#'+PIN_COLORS[idx%PIN_COLORS.length].toString(16).padStart(6,'0'); }

function dropAnnotation(worldPos) {
  if(!viewerScene) return;
  const id=++annotCount;
  const col=PIN_COLORS[(id-1)%PIN_COLORS.length];
  const hexC=getPinHex(id-1);
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.027,12,12),new THREE.MeshBasicMaterial({color:col}));
  mesh.position.copy(worldPos); viewerScene.add(mesh);
  const stemPts=[worldPos.clone(),worldPos.clone().add(new THREE.Vector3(0,0.1,0))];
  const stem=new THREE.Line(new THREE.BufferGeometry().setFromPoints(stemPts),new THREE.LineBasicMaterial({color:col}));
  viewerScene.add(stem);
  const div=document.createElement('div');
  div.style.cssText=`position:fixed;background:${hexC};color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;pointer-events:auto;cursor:pointer;z-index:150;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.6);`;
  div.textContent=`#${id}`;
  div.title=`Pin #${id} — click to remove`;
  div.addEventListener('click',()=>removeAnnotation(id));
  document.body.appendChild(div);
  annotations.push({mesh,stem,labelDiv:div,worldPos:worldPos.clone(),id,color:col});
  document.getElementById('annot-count').textContent=annotations.length;
}

function removeAnnotation(id) {
  const idx=annotations.findIndex(a=>a.id===id); if(idx===-1) return;
  const a=annotations[idx]; viewerScene?.remove(a.mesh); viewerScene?.remove(a.stem); a.labelDiv?.remove();
  annotations.splice(idx,1);
  document.getElementById('annot-count').textContent=annotations.length;
}
function onClearAnnotations(){[...annotations].forEach(a=>removeAnnotation(a.id));}

function updateAnnotationLabels() {
  if(!viewerCamera||!viewerRenderer) return;
  const r=viewerRenderer.domElement.getBoundingClientRect();
  annotations.forEach(a=>{
    const v=a.worldPos.clone().project(viewerCamera);
    const x=(v.x*0.5+0.5)*r.width+r.left, y=(-v.y*0.5+0.5)*r.height+r.top;
    if(v.z<1){a.labelDiv.style.left=(x+10)+'px';a.labelDiv.style.top=(y-12)+'px';a.labelDiv.style.display='block';}
    else a.labelDiv.style.display='none';
  });
}

// ════════════════════════════════════════════════════════════
//  PIN VISIBILITY (for export)
// ════════════════════════════════════════════════════════════
function isPinVisible(pin) {
  if(!viewerCamera||!loadedModel) return true;
  const v=pin.worldPos.clone().project(viewerCamera);
  if(v.z>=1||Math.abs(v.x)>1.05||Math.abs(v.y)>1.05) return false;
  const dir=pin.worldPos.clone().sub(viewerCamera.position).normalize();
  raycaster.set(viewerCamera.position.clone(),dir);
  const meshes=[]; loadedModel.traverse(c=>{if(c.isMesh)meshes.push(c);});
  const hits=raycaster.intersectObjects(meshes,false);
  if(!hits.length) return true;
  return hits[0].distance>=(viewerCamera.position.distanceTo(pin.worldPos)-0.06);
}

// ════════════════════════════════════════════════════════════
//  EXPORT PDF
// ════════════════════════════════════════════════════════════
async function exportPinReport() {
  if(!viewerRenderer||!viewerScene||!viewerCamera){alert('Open a model first.');return;}
  if(!window.jspdf){alert('jsPDF still loading — try again in a moment.');return;}
  viewerRenderer.render(viewerScene,viewerCamera);
  const imgData=viewerRenderer.domElement.toDataURL('image/jpeg',0.93);
  const modelName=document.getElementById('viewer-title').textContent||'model';
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297,PH=210;
  // Background
  pdf.setFillColor(10,10,11); pdf.rect(0,0,PW,PH,'F');
  // Header
  pdf.setTextColor(200,245,66); pdf.setFont('helvetica','bold'); pdf.setFontSize(17);
  pdf.text('VR.browser — Pin Report',14,15);
  pdf.setTextColor(160,160,170); pdf.setFont('helvetica','normal'); pdf.setFontSize(8);
  pdf.text(`${modelName}   ·   ${new Date().toLocaleString()}   ·   ${annotations.length} pin(s)`,14,22);
  // Viewport image
  const imgX=14,imgY=27,imgW=180,imgH=112;
  pdf.setDrawColor(44,44,50); pdf.setLineWidth(0.3); pdf.rect(imgX,imgY,imgW,imgH);
  pdf.addImage(imgData,'JPEG',imgX,imgY,imgW,imgH);
  // Pin dots on image
  const cW=viewerRenderer.domElement.width, cH=viewerRenderer.domElement.height;
  annotations.forEach(pin=>{
    const v=pin.worldPos.clone().project(viewerCamera);
    if(v.z>=1) return;
    const sx=(v.x*0.5+0.5)*cW, sy=(1-(v.y*0.5+0.5))*cH;
    const px=imgX+(sx/cW)*imgW, py=imgY+(sy/cH)*imgH;
    if(px<imgX||px>imgX+imgW||py<imgY||py>imgY+imgH) return;
    const hx=getPinHex(pin.id-1);
    const r=parseInt(hx.slice(1,3),16),g=parseInt(hx.slice(3,5),16),b=parseInt(hx.slice(5,7),16);
    pdf.setFillColor(r,g,b); pdf.circle(px,py,2.5,'F');
    pdf.setTextColor(255,255,255); pdf.setFontSize(6.5); pdf.setFont('helvetica','bold');
    pdf.text(`#${pin.id}`,px-2.2,py+1);
  });
  // Legend
  const tx=202,ty=27,tw=81,th=imgH;
  pdf.setFillColor(18,18,22); pdf.rect(tx,ty,tw,th,'F');
  pdf.setDrawColor(44,44,50); pdf.rect(tx,ty,tw,th);
  pdf.setTextColor(140,140,155); pdf.setFont('helvetica','bold'); pdf.setFontSize(7.5);
  pdf.text('PIN REFERENCE',tx+4,ty+7);
  pdf.setDrawColor(44,44,50); pdf.setLineWidth(0.15); pdf.line(tx,ty+10,tx+tw,ty+10);
  const vis=annotations.filter(isPinVisible), hid=annotations.filter(p=>!isPinVisible(p));
  let ry=ty+17;
  [...vis,...hid].forEach((pin,i)=>{
    if(ry>ty+th-7) return;
    const hx=getPinHex(pin.id-1);
    const r=parseInt(hx.slice(1,3),16),g=parseInt(hx.slice(3,5),16),b=parseInt(hx.slice(5,7),16);
    const visible=isPinVisible(pin);
    pdf.setFillColor(r,g,b); pdf.circle(tx+6,ry-0.5,2,'F');
    pdf.setTextColor(210,210,220); pdf.setFont('helvetica','bold'); pdf.setFontSize(7.5);
    pdf.text(`#${pin.id}`,tx+11,ry+0.5);
    pdf.setFont('helvetica','normal'); pdf.setFontSize(6.5); pdf.setTextColor(110,110,125);
    pdf.text(`${(pin.worldPos.x*100).toFixed(0)}, ${(pin.worldPos.y*100).toFixed(0)}, ${(pin.worldPos.z*100).toFixed(0)} cm`,tx+19,ry+0.5);
    // Badge
    if(visible){pdf.setFillColor(25,50,25);pdf.roundedRect(tx+tw-17,ry-3,15,4.5,1,1,'F');pdf.setTextColor(70,180,70);pdf.setFontSize(5.5);pdf.text('visible',tx+tw-15,ry+0.5);}
    else{pdf.setFillColor(55,20,20);pdf.roundedRect(tx+tw-17,ry-3,15,4.5,1,1,'F');pdf.setTextColor(210,70,70);pdf.setFontSize(5.5);pdf.text('hidden',tx+tw-15,ry+0.5);}
    if(i<annotations.length-1){pdf.setDrawColor(30,30,38);pdf.setLineWidth(0.1);pdf.line(tx+3,ry+5,tx+tw-3,ry+5);}
    ry+=11;
  });
  if(!annotations.length){pdf.setTextColor(90,90,100);pdf.setFontSize(8);pdf.text('No pins placed.',tx+tw/2,ty+th/2,{align:'center'});}
  // Footer
  pdf.setFillColor(16,16,20); pdf.rect(0,PH-14,PW,14,'F');
  pdf.setTextColor(90,90,105); pdf.setFont('helvetica','normal'); pdf.setFontSize(7.5);
  pdf.text('Generated by VR.browser  ·  Visible = unobstructed from current camera angle',14,PH-5.5);
  pdf.text(`${vis.length} visible  /  ${hid.length} hidden`,PW-14,PH-5.5,{align:'right'});
  pdf.save(`${modelName}-pin-report.pdf`);
}

// ════════════════════════════════════════════════════════════
//  DESKTOP INTERACTION
// ════════════════════════════════════════════════════════════
function setDesktopMode(mode, silent) {
  desktopMode=mode;
  ['orbit','meas','pin'].forEach(m=>{
    const btn=document.getElementById('dm-'+m);
    if(btn) btn.classList.toggle('active',m===mode||(m==='orbit'&&mode==='orbit'));
  });
  if(viewerControls) viewerControls.enabled=(mode==='orbit');
  const cw=document.getElementById('viewer-canvas-wrap');
  if(cw) cw.className=mode==='pin'?'canvas-pin':mode==='measure'?'canvas-meas':'canvas-orbit';
}

function onCanvasClick(e) {
  if(desktopMode==='orbit'||!viewerCamera||!viewerRenderer||!loadedModel) return;
  const cv=viewerRenderer.domElement, rect=cv.getBoundingClientRect();
  mouseNDC.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouseNDC.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouseNDC,viewerCamera);
  const ms=[]; loadedModel.traverse(c=>{if(c.isMesh)ms.push(c);});
  const hits=raycaster.intersectObjects(ms,false);
  if(!hits.length) return;
  const pt=hits[0].point;
  if(desktopMode==='pin') {
    dropAnnotation(pt);
  } else if(desktopMode==='measure') {
    if(measurePhase===0){
      measureState.ptA=pt.clone(); measurePhase=1;
      measureState.sphereA&&(measureState.sphereA.position.copy(pt),measureState.sphereA.visible=true);
      measureState.sphereB&&(measureState.sphereB.visible=false);
      measureState.lineObj&&(measureState.lineObj.visible=false);
      const dr=document.getElementById('measure-readout'); if(dr) dr.textContent='Click pt B…';
    } else {
      measureState.ptB=pt.clone(); updateMeasureLine(); measurePhase=0;
    }
  }
}

// ════════════════════════════════════════════════════════════
//  MEASURE
// ════════════════════════════════════════════════════════════
function buildMeasureObjects(scene) {
  measureState.lineObj=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]),
    new THREE.LineBasicMaterial({color:0xf5a142,linewidth:2}));
  measureState.lineObj.visible=false; scene.add(measureState.lineObj);
  const sm=new THREE.MeshBasicMaterial({color:0xf5a142}),sg=new THREE.SphereGeometry(0.015,10,10);
  measureState.sphereA=new THREE.Mesh(sg,sm.clone()); measureState.sphereA.visible=false;
  measureState.sphereB=new THREE.Mesh(sg,sm.clone()); measureState.sphereB.visible=false;
  scene.add(measureState.sphereA); scene.add(measureState.sphereB);
}
function updateMeasureLine() {
  if(!measureState.ptA||!measureState.ptB) return;
  measureState.lineObj.geometry.setFromPoints([measureState.ptA.clone(),measureState.ptB.clone()]);
  measureState.lineObj.geometry.computeBoundingSphere();
  measureState.lineObj.visible=true;
  measureState.sphereA.position.copy(measureState.ptA); measureState.sphereA.visible=true;
  measureState.sphereB.position.copy(measureState.ptB); measureState.sphereB.visible=true;
  const d=measureState.ptA.distanceTo(measureState.ptB);
  const lbl=d>=1?d.toFixed(3)+' m':(d*100).toFixed(1)+' cm';
  document.getElementById('hud-measure').textContent='↔ '+lbl;
  document.getElementById('hud-measure').style.display='block';
  const dr=document.getElementById('measure-readout'); if(dr) dr.textContent=lbl;
}
function clearMeasure() {
  measureState.ptA=measureState.ptB=null; measurePhase=0;
  measureState.lineObj&&(measureState.lineObj.visible=false);
  measureState.sphereA&&(measureState.sphereA.visible=false);
  measureState.sphereB&&(measureState.sphereB.visible=false);
  document.getElementById('hud-measure').style.display='none';
  const dr=document.getElementById('measure-readout'); if(dr) dr.textContent='—';
}

// ════════════════════════════════════════════════════════════
//  EXPLODE
// ════════════════════════════════════════════════════════════
function cacheExplodeOrigins() {
  explodeOrigins.clear(); if(!loadedModel) return;
  loadedModel.traverse(c=>{if(c.isMesh) explodeOrigins.set(c.uuid,c.position.clone());});
}
function applyExplode(t) {
  if(!loadedModel) return;
  const box=new THREE.Box3().setFromObject(loadedModel);
  const ctr=new THREE.Vector3(); box.getCenter(ctr); loadedModel.worldToLocal(ctr);
  loadedModel.traverse(c=>{
    if(!c.isMesh) return;
    const orig=explodeOrigins.get(c.uuid); if(!orig) return;
    const dir=orig.clone().sub(ctr); const dist=dir.length(); dir.normalize();
    c.position.copy(orig).addScaledVector(dir,t*(0.4+dist*1.2));
  });
  explodeAmount=t;
  const lbl=document.getElementById('explode-val'); if(lbl) lbl.textContent=Math.round(t*100)+'%';
}
function onExplodeSlider(val){applyExplode(parseFloat(val));}

// ════════════════════════════════════════════════════════════
//  VR LASER
// ════════════════════════════════════════════════════════════
function buildLaser(scene) {
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-8)]);
  laserLine=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x4290f5,linewidth:2}));
  laserLine.visible=false; scene.add(laserLine);
  laserDot=new THREE.Mesh(new THREE.SphereGeometry(0.016,10,10),new THREE.MeshBasicMaterial({color:0x4290f5}));
  laserDot.visible=false; scene.add(laserDot);
}
function updateLaser(ctrl) {
  if(!ctrl||!loadedModel) return;
  laserLine.position.setFromMatrixPosition(ctrl.matrixWorld);
  laserLine.quaternion.setFromRotationMatrix(ctrl.matrixWorld);
  laserLine.visible=true;
  const origin=new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld);
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(new THREE.Quaternion().setFromRotationMatrix(ctrl.matrixWorld)).normalize();
  raycaster.set(origin,dir);
  const ms=[]; loadedModel.traverse(c=>{if(c.isMesh)ms.push(c);});
  const hits=raycaster.intersectObjects(ms,false);
  if(hits.length){
    laserDot.position.copy(hits[0].point); laserDot.visible=true;
    ctrl.userData.laserHit=hits[0].point.clone();
  } else { laserDot.visible=false; ctrl.userData.laserHit=null; }
}

// ════════════════════════════════════════════════════════════
//  VR HUD
// ════════════════════════════════════════════════════════════
function updateHUD() {
  const pills=document.getElementById('hud-pills');
  const modes=[
    {id:'grab',   icon:'✦',label:'Grab',   color:'#c8f542'},
    {id:'slice',  icon:'⬡',label:'Slice',  color:'#42f5c8'},
    {id:'measure',icon:'↔',label:'Measure',color:'#f5a142'},
    {id:'laser',  icon:'◉',label:'Laser',  color:'#4290f5'},
  ];
  pills.innerHTML=modes.map(m=>{
    const a=vrMode===m.id;
    return `<span style="font-family:'DM Mono',monospace;font-size:12px;padding:5px 11px;border-radius:7px;border:1px solid ${m.color};color:${a?'#0a0a0b':m.color};background:${a?m.color:'rgba(0,0,0,0.6)'};">${m.icon} ${m.label}</span>`;
  }).join('');
}
function cycleVRMode() {
  vrMode=VR_MODES[(VR_MODES.indexOf(vrMode)+1)%VR_MODES.length];
  clearMeasure();
  if(slicerActive){slicerActive=false;slicerMesh&&(slicerMesh.visible=false);setClipping(false);}
  if(laserLine) laserLine.visible=(vrMode==='laser');
  if(laserDot&&vrMode!=='laser') laserDot.visible=false;
  updateHUD();
}

// ════════════════════════════════════════════════════════════
//  MANIPULATION
// ════════════════════════════════════════════════════════════
function ctrlWorldPos(c){return new THREE.Vector3().setFromMatrixPosition(c.matrixWorld);}
function ctrlWorldQuat(c){return new THREE.Quaternion().setFromRotationMatrix(c.matrixWorld);}
function applyOneHandedGrab(ctrl) {
  if(!grabState.left||!modelRoot) return;
  const cur=ctrlWorldPos(ctrl),d=cur.clone().sub(grabState.left.prevPos);
  modelRoot.position.add(d); grabState.left.prevPos.copy(cur);
}
function applyTwoHandedGrab(cL,cR) {
  if(!grabState.left||!grabState.right||!modelRoot) return;
  const cl=ctrlWorldPos(cL),cr=ctrlWorldPos(cR),pL=grabState.left.prevPos,pR=grabState.right.prevPos;
  const cMid=cl.clone().add(cr).multiplyScalar(0.5);
  const sd=pL.distanceTo(pR)>0.001?cl.distanceTo(cr)/pL.distanceTo(pR):1;
  const cv=new THREE.Vector2(cr.x-cl.x,cr.z-cl.z).normalize();
  const pv=new THREE.Vector2(pR.x-pL.x,pR.z-pL.z).normalize();
  const ay=Math.atan2(pv.x*cv.y-pv.y*cv.x,pv.x*cv.x+pv.y*cv.y);
  const rot=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),ay);
  const off=modelRoot.position.clone().sub(pL.clone().add(pR).multiplyScalar(0.5)).multiplyScalar(sd).applyQuaternion(rot);
  modelRoot.position.copy(cMid).add(off);
  modelRoot.quaternion.premultiply(rot); modelRoot.scale.multiplyScalar(sd);
  grabState.left.prevPos.copy(cl); grabState.right.prevPos.copy(cr);
}

// ════════════════════════════════════════════════════════════
//  RESET / SNAPSHOT
// ════════════════════════════════════════════════════════════
function onResetTransform() {
  if(!modelRoot) return;
  modelRoot.scale.setScalar(1); modelRoot.position.set(0,0,0); modelRoot.quaternion.identity();
  if(loadedModel){const box=new THREE.Box3().setFromObject(modelRoot);modelRoot.position.y-=box.min.y;}
  clearMeasure();
}
function onSnapshot() {
  if(!viewerRenderer||!viewerScene||!viewerCamera) return;
  viewerRenderer.render(viewerScene,viewerCamera);
  const a=document.createElement('a');
  a.href=viewerRenderer.domElement.toDataURL('image/png');
  a.download=(document.getElementById('viewer-title').textContent||'model')+'-snapshot.png';
  a.click();
}

// ════════════════════════════════════════════════════════════
//  CONTROLLERS
// ════════════════════════════════════════════════════════════
function setupControllers(renderer,scene) {
  const cL=renderer.xr.getController(0), cR=renderer.xr.getController(1);
  scene.add(cL); scene.add(cR);
  function makeRay(col){
    const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-0.06)]);
    return new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.5}));
  }
  cL.add(makeRay(0xc8f542)); cR.add(makeRay(0x4290f5));
  // Left grip → grab
  cL.addEventListener('squeezestart',()=>{
    grabState.left={prevPos:ctrlWorldPos(cL),prevQuat:ctrlWorldQuat(cL)};
    if(slicerActive){slicerActive=false;slicerMesh&&(slicerMesh.visible=false);setClipping(false);}
  });
  cL.addEventListener('squeezeend',()=>{grabState.left=null;});
  // Left trigger → measure pt A
  cL.addEventListener('selectstart',()=>{
    if(vrMode==='measure'){
      measureState.ptA=ctrlWorldPos(cL); measurePhase=1;
      measureState.sphereA&&(measureState.sphereA.position.copy(measureState.ptA),measureState.sphereA.visible=true);
    }
  });
  // Right grip → slice / second grab
  cR.addEventListener('squeezestart',()=>{
    grabState.right={prevPos:ctrlWorldPos(cR),prevQuat:ctrlWorldQuat(cR)};
    if(!grabState.left&&vrMode==='slice'){slicerActive=true;slicerMesh&&(slicerMesh.visible=true);setClipping(true);}
  });
  cR.addEventListener('squeezeend',()=>{
    grabState.right=null;
    if(slicerActive){slicerActive=false;slicerMesh&&(slicerMesh.visible=false);setClipping(false);}
  });
  // Right trigger → measure pt B (laser mode: trigger just aims, A button pins)
  cR.addEventListener('selectstart',()=>{
    if(vrMode==='measure'&&measurePhase===1){measureState.ptB=ctrlWorldPos(cR);updateMeasureLine();measurePhase=0;}
  });
  cL.addEventListener('connected',e=>{cL.userData.gamepad=e.data?.gamepad;});
  cR.addEventListener('connected',e=>{cR.userData.gamepad=e.data?.gamepad;});
  scene.userData.ctrlL=cL; scene.userData.ctrlR=cR;
}

function pollGamepadButtons() {
  const cL=viewerScene?.userData.ctrlL, cR=viewerScene?.userData.ctrlR;
  if(cL?.userData.gamepad){
    const p=cL.userData.gamepad.buttons[3]?.pressed;
    if(p&&!_lastThumbL) cycleVRMode(); _lastThumbL=!!p;
  }
  if(cR?.userData.gamepad){
    const p3=cR.userData.gamepad.buttons[3]?.pressed;
    if(p3&&!_lastThumbR) cycleVRMode(); _lastThumbR=!!p3;
    // A button (index 4) → drop laser pin
    const pA=cR.userData.gamepad.buttons[4]?.pressed;
    if(pA&&!_prevFaceA&&vrMode==='laser'&&cR.userData.laserHit){
      dropAnnotation(cR.userData.laserHit.clone());
    }
    _prevFaceA=!!pA;
  }
}

// ════════════════════════════════════════════════════════════
//  INIT VIEWER
// ════════════════════════════════════════════════════════════
function initViewer(fileId) {
  const wrap=document.getElementById('viewer-canvas-wrap');
  viewerRenderer=new THREE.WebGLRenderer({antialias:true,stencil:true,preserveDrawingBuffer:true});
  viewerRenderer.setPixelRatio(window.devicePixelRatio);
  viewerRenderer.setSize(wrap.clientWidth,wrap.clientHeight);
  viewerRenderer.outputEncoding=THREE.sRGBEncoding;
  viewerRenderer.xr.enabled=true; viewerRenderer.localClippingEnabled=true;
  wrap.appendChild(viewerRenderer.domElement);
  viewerRenderer.domElement.addEventListener('click',onCanvasClick);

  viewerScene=new THREE.Scene(); viewerScene.background=new THREE.Color(0x0a0a0b);
  viewerCamera=new THREE.PerspectiveCamera(60,wrap.clientWidth/wrap.clientHeight,0.01,500);
  viewerCamera.position.set(0,1.6,2.5);
  viewerScene.add(new THREE.AmbientLight(0xffffff,0.65));
  sunLight=new THREE.DirectionalLight(0xffffff,1.5);
  const lr=lightAngleDeg*Math.PI/180;
  sunLight.position.set(Math.sin(lr)*8,6,Math.cos(lr)*8); viewerScene.add(sunLight);
  const fill=new THREE.DirectionalLight(0x8888ff,0.2); fill.position.set(-4,2,-3); viewerScene.add(fill);
  viewerScene.add(new THREE.GridHelper(20,40,0x222226,0x18181c));

  viewerControls=new THREE.OrbitControls(viewerCamera,viewerRenderer.domElement);
  viewerControls.enableDamping=true; viewerControls.dampingFactor=0.07; viewerControls.target.set(0,0.8,0);

  buildSlicer(viewerScene);
  buildMeasureObjects(viewerScene);
  buildDesktopSlicePlanes(viewerScene);
  buildLaser(viewerScene);

  viewerRenderer.xr.addEventListener('sessionstart',()=>{
    setupControllers(viewerRenderer,viewerScene);
    if(viewerControls) viewerControls.enabled=false;
    document.getElementById('vr-hud').style.display='block';
    updateHUD();
  });
  viewerRenderer.xr.addEventListener('sessionend',()=>{
    if(viewerControls) viewerControls.enabled=true;
    grabState.left=grabState.right=null;
    slicerActive=false; slicerMesh&&(slicerMesh.visible=false); setClipping(false);
    if(laserLine) laserLine.visible=false;
    if(laserDot) laserDot.visible=false;
    document.getElementById('vr-hud').style.display='none';
    setDesktopMode('orbit');
  });

  modelRoot=new THREE.Group(); viewerScene.add(modelRoot);

  new THREE.GLTFLoader().load(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${config.apiKey}`,
    gltf=>{
      const model=gltf.scene;
      const box=new THREE.Box3().setFromObject(model);
      const cent=box.getCenter(new THREE.Vector3()), size=box.getSize(new THREE.Vector3());
      model.position.x-=cent.x; model.position.z-=cent.z; model.position.y-=box.min.y;
      model.traverse(c=>{if(!c.isMesh)return;c.material.clippingPlanes=[];c.material.side=THREE.DoubleSide;c.material.needsUpdate=true;});
      modelRoot.add(model); loadedModel=model; modelSize.copy(size);
      cacheExplodeOrigins();
      document.getElementById('loading-overlay').classList.add('hidden');
      const ts=document.getElementById('tool-strip'); if(ts) ts.style.display='flex';
      ['hslice-tog','vslice-tog'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
      hSliceActive=vSliceActive=false;
      if(hSliceEdge) hSliceEdge.visible=false;
      if(vSliceEdge) vSliceEdge.visible=false;
      setDesktopMode('orbit');
      const maxDim=Math.max(size.x,size.y,size.z);
      viewerCamera.position.set(maxDim*1.5,maxDim*0.8,maxDim*1.5);
      viewerCamera.lookAt(0,size.y/2,0); viewerControls.target.set(0,size.y/2,0); viewerControls.update();
      const sr=document.getElementById('size-readout');
      if(sr) sr.textContent=`${(size.x*100).toFixed(0)} × ${(size.y*100).toFixed(0)} × ${(size.z*100).toFixed(0)} cm`;
      checkXRSupport();
    },
    prog=>{document.getElementById('loading-label').textContent=`Loading… ${prog.total?Math.round(prog.loaded/prog.total*100):'…'}%`;},
    err=>{document.getElementById('loading-label').textContent='Failed to load model';console.error(err);}
  );

  viewerRenderer.setAnimationLoop(()=>{
    if(viewerControls?.enabled) viewerControls.update();
    if(viewerRenderer.xr.isPresenting){
      const cL=viewerRenderer.xr.getController(0), cR=viewerRenderer.xr.getController(1);
      pollGamepadButtons();
      if(grabState.left&&grabState.right) applyTwoHandedGrab(cL,cR);
      else if(grabState.left) applyOneHandedGrab(cL);
      if(slicerActive&&!grabState.left) updateSlicer(cR);
      if(vrMode==='laser') updateLaser(cR);
      else if(laserLine?.visible){laserLine.visible=false;if(laserDot)laserDot.visible=false;}
    }
    updateAnnotationLabels();
    viewerRenderer.render(viewerScene,viewerCamera);
  });

  window.addEventListener('resize',()=>{
    if(!viewerRenderer) return;
    const w=wrap.clientWidth,h=wrap.clientHeight;
    viewerRenderer.setSize(w,h);
    if(viewerCamera){viewerCamera.aspect=w/h;viewerCamera.updateProjectionMatrix();}
  });
}

// ════════════════════════════════════════════════════════════
//  XR SESSION
// ════════════════════════════════════════════════════════════
async function checkXRSupport() {
  const btn=document.getElementById('vr-btn');
  if(!navigator.xr){btn.textContent='VR not supported';btn.disabled=true;return;}
  const ok=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
  if(ok){btn.textContent='⬡ Enter VR';btn.disabled=false;}
  else{btn.textContent='VR not available';btn.style.opacity='0.5';}
}
async function enterVR() {
  if(!navigator.xr||!viewerRenderer) return;
  try {
    const session=await navigator.xr.requestSession('immersive-vr',{
      requiredFeatures:['local-floor'],
      optionalFeatures:['bounded-floor','hand-tracking','dom-overlay'],
      domOverlay:{root:document.getElementById('vr-hud')}
    });
    viewerRenderer.xr.setSession(session);
    session.addEventListener('end',()=>{
      document.getElementById('vr-btn').textContent='⬡ Enter VR';
      if(slicerActive){slicerActive=false;slicerMesh&&(slicerMesh.visible=false);setClipping(false);}
    });
    document.getElementById('vr-btn').textContent='◼ Exit VR';
  } catch(e){alert('Could not start VR session: '+e.message);}
}
</script>
